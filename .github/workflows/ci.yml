name: My First CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Say hello
        run: echo "Hello from CI"

      - name: Show actor
        run: echo "Triggered by ${{ github.actor }}"
